<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Security: restrict network calls to only the two free services this build uses
       (GitHub Models for text, Pollinations.ai for images) -- no other third-party
       origins are trusted for data, mitigating XSS exfiltration of the locally-stored
       GitHub PAT. `unsafe-eval`/`unsafe-inline` on script-src and the ws: connect-src
       are required by Vite's dev server (HMR/React Refresh) and are a standard, low-risk
       relaxation for local development; for a real deployment, prefer setting an even
       stricter CSP via an HTTP response header at the hosting layer (see README).
       `blob:` on connect-src/worker-src is required by three.js: GLTFLoader fetches
       embedded textures via blob: URLs, and DRACOLoader/pathfinding run their decoders
       in workers instantiated from blob: URLs -- without these the office/avatar models
       fail to decode and the 3D canvas renders empty. Google Fonts is allowed read-only
       (no credentials sent) for the Inter typeface used throughout the UI. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://image.pollinations.ai; connect-src 'self' blob: ws: wss: https://models.github.ai https://image.pollinations.ai; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" />
  <title>The Delegation</title>
  <meta name="description" content="A no-code 3D playground to explore, design, and interact with Agentic AI systems" />
  <link rel="icon" href="/3d-agent-office-pilot/favicon.ico" />

  <meta property="og:description"
    content="A no-code 3D playground to explore, design, and interact with Agentic AI systems">
  <meta property="og:image" content="https://arturitu.github.io/the-delegation/og.jpg">
